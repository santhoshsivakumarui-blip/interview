<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Learn PostgreSQL fundamentals, indexing, query planning, and best practices for building reliable relational systems.">
<link rel="stylesheet" href="site.css">
<title>PostgreSQL Like a Pro | Query Tuning & Relational Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1220;
  --surface:#121B2E;
  --surface-2:#1A2740;
  --surface-3:#22314E;
  --accent:#F2B84B;
  --accent-dim:#8A6B2C;
  --teal:#4FD1C5;
  --rose:#E8607A;
  --success:#4ADE80;
  --text:#E7EBF5;
  --muted:#8C97B3;
  --line:rgba(255,255,255,0.09);
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(79,209,197,0.08), transparent 60%),
    radial-gradient(1000px 500px at 90% 10%, rgba(242,184,75,0.07), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  line-height:1.5;
}
.wrap{max-width:900px;margin:0 auto;padding:32px 20px 80px;}

/* ---------- HERO ---------- */
.hero{padding:20px 4px 36px;border-bottom:1px solid var(--line);margin-bottom:36px;}
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  color:var(--teal);
  font-size:12.5px;
  letter-spacing:.12em;
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px rgba(79,209,197,0.15);animation:pulse-dot 1.8s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 4px rgba(79,209,197,0.15);}50%{box-shadow:0 0 0 8px rgba(79,209,197,0.03);}}
h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(28px,5vw,44px);
  font-weight:700;
  margin:10px 0 12px;
  letter-spacing:-0.01em;
}
h1 span{color:var(--accent);}
.hero p{color:var(--muted);font-size:15.5px;max-width:560px;margin:0 0 22px;}

.query-bar{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 16px;
  font-family:'JetBrains Mono',monospace;
  font-size:14.5px;
  color:var(--teal);
  display:flex;
  align-items:center;
  gap:2px;
  overflow:hidden;
  white-space:nowrap;
}
.query-bar .caret{
  display:inline-block;width:8px;height:16px;background:var(--accent);
  margin-left:2px;animation:blink 1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0;}}
#typed{color:var(--text);}
#typed .k{color:var(--accent);}
#typed .s{color:var(--rose);}

.progress-row{display:flex;align-items:center;gap:12px;margin-top:20px;}
.progress-track{flex:1;height:8px;border-radius:6px;background:var(--surface-2);overflow:hidden;}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--teal),var(--accent));width:0%;transition:width .5s ease;}
.progress-label{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--muted);white-space:nowrap;}

/* ---------- ROADMAP ---------- */
.roadmap{position:relative;}
.track-line{
  position:absolute;left:19px;top:8px;bottom:8px;width:2px;
  background:linear-gradient(var(--surface-3),var(--surface-3));
  z-index:0;
}
.track-line::after{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,var(--teal) 0 6px,transparent 6px 16px);
  opacity:.55;
  animation:flow 1.4s linear infinite;
}
@keyframes flow{to{background-position:0 -22px;}}

.stop{position:relative;z-index:1;margin-bottom:10px;}
.stop-head{
  display:flex;align-items:center;gap:16px;cursor:pointer;
  padding:12px 10px;border-radius:12px;
  transition:background .15s ease;
}
.stop-head:hover{background:rgba(255,255,255,0.03);}
.node{
  width:40px;height:40px;min-width:40px;border-radius:50%;
  background:var(--surface-2);border:2px solid var(--surface-3);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;
  color:var(--muted);transition:all .2s ease;position:relative;
}
.stop.done .node{background:var(--success);border-color:var(--success);color:#0B1220;}
.stop.open .node{border-color:var(--accent);color:var(--accent);}
.node svg{width:16px;height:16px;}
.stop-main h3{margin:0 0 3px;font-family:'Space Grotesk',sans-serif;font-size:16.5px;font-weight:600;}
.stop-main p{margin:0;font-size:13px;color:var(--muted);}
.chev{margin-left:auto;color:var(--muted);transition:transform .2s ease;font-size:13px;padding-right:4px;}
.stop.open .chev{transform:rotate(90deg);color:var(--accent);}

.panel{
  max-height:0;overflow:hidden;
  transition:max-height .35s ease;
  margin-left:56px;
}
.stop.open .panel{max-height:2400px;}
.panel-inner{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px 22px;margin:4px 0 18px;
}
.analogy{
  font-size:14.5px;color:var(--text);
  background:var(--surface-2);border-left:3px solid var(--teal);
  padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:16px;
}
.analogy b{color:var(--teal);}

.demo-box{
  background:var(--surface-2);border:1px solid var(--line);border-radius:10px;
  padding:18px;min-height:170px;position:relative;margin-bottom:16px;
  display:flex;flex-direction:column;gap:12px;justify-content:center;
}
.demo-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px;}
.btn{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  background:var(--surface-3);border:1px solid var(--line);color:var(--text);
  padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .15s ease;
}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.active{background:var(--accent);border-color:var(--accent);color:#231705;}
.btn.replay{margin-left:auto;color:var(--muted);}

pre.code{
  background:#0A101C;border:1px solid var(--line);border-radius:8px;
  padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12.8px;
  overflow-x:auto;margin:0 0 14px;color:var(--text);
}
pre.code .kw{color:var(--accent);}
pre.code .fn{color:var(--teal);}
pre.code .st{color:#C3E88D;}
pre.code .cm{color:var(--muted);font-style:italic;}

.tip{
  font-size:13px;color:var(--muted);display:flex;gap:8px;align-items:flex-start;
  border-top:1px dashed var(--line);padding-top:12px;
}
.tip b{color:var(--accent);flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;}

.done-toggle{
  display:inline-flex;align-items:center;gap:7px;margin-top:14px;
  font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;
  color:var(--muted);user-select:none;
}
.done-toggle .box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--muted);display:flex;align-items:center;justify-content:center;}
.stop.done .done-toggle{color:var(--success);}
.stop.done .done-toggle .box{background:var(--success);border-color:var(--success);color:#0B1220;font-size:11px;}

/* ---------- Generic mini components used across demos ---------- */
.mini-table{display:flex;flex-direction:column;gap:4px;font-family:'JetBrains Mono',monospace;font-size:12px;}
.mrow{
  display:grid;grid-template-columns:1.3fr .8fr .8fr;gap:8px;
  background:var(--surface-3);border-radius:6px;padding:6px 10px;
  opacity:0;transform:translateY(6px);
}
.demo-box.play .mrow{animation:rowIn .4s ease forwards;}
@keyframes rowIn{to{opacity:1;transform:translateY(0);}}
.mrow.dim{transition:opacity .4s ease, filter .4s ease;}
.demo-box.play .mrow.gray{animation:rowIn .4s ease forwards, grayOut .4s ease 1.1s forwards;}
@keyframes grayOut{to{opacity:.18;filter:grayscale(1);}}
.rank{display:inline-block;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#231705;font-size:9px;text-align:center;line-height:16px;opacity:0;margin-right:4px;}
.demo-box.play .rank{animation:popIn .3s ease forwards;}
@keyframes popIn{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}
.cutline{position:relative;text-align:center;font-size:11px;color:var(--rose);opacity:0;height:0;}
.demo-box.play .cutline{animation:cutIn .3s ease 1.9s forwards;}
@keyframes cutIn{to{opacity:1;height:auto;}}

.candy-row{display:flex;gap:8px;flex-wrap:wrap;min-height:30px;}
.candy{width:20px;height:20px;border-radius:50%;transition:transform 1s cubic-bezier(.4,0,.2,1), opacity .3s ease;}
.buckets{display:flex;gap:14px;margin-top:10px;}
.bucket{flex:1;min-height:64px;border:1.5px dashed var(--line);border-radius:8px;padding:8px;text-align:center;position:relative;}
.bucket .count{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;opacity:0;}
.demo-box.play .bucket .count{animation:popIn .3s ease 1.3s forwards;}
.bucket.filtered{transition:opacity .4s ease;}
.demo-box.play .bucket.filtered{animation:shakeOut 1s ease 1.7s forwards;}
@keyframes shakeOut{0%{transform:translateX(0);}20%{transform:translateX(-4px);}40%{transform:translateX(4px);}60%{transform:translateX(-3px);}100%{transform:translateX(0);opacity:.25;filter:grayscale(1);}}

.venn{display:flex;justify-content:center;}
.legend{display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block;}

.nest{font-family:'JetBrains Mono',monospace;font-size:12px;}
.nbox{border:1px solid var(--line);border-radius:8px;padding:12px;transition:all .4s ease;}
.nbox.outer{background:var(--surface-3);}
.nbox.inner{background:var(--surface);margin-top:8px;border-color:var(--teal);opacity:.4;transform:scale(.96);}
.demo-box.play .nbox.inner{animation:innerCompute 1.6s ease forwards;}
@keyframes innerCompute{0%{opacity:.4;transform:scale(.96);}30%{opacity:1;transform:scale(1);box-shadow:0 0 0 2px var(--teal);}70%{opacity:1;box-shadow:0 0 0 2px var(--teal);}100%{opacity:.85;box-shadow:none;}}
.arrow-up{text-align:center;color:var(--teal);opacity:0;font-size:16px;}
.demo-box.play .arrow-up{animation:riseFade 1s ease 1.7s forwards;}
@keyframes riseFade{0%{opacity:0;transform:translateY(0);}50%{opacity:1;}100%{opacity:0;transform:translateY(-14px);}}
.final-badge{text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);opacity:0;}
.demo-box.play .final-badge{animation:popIn .3s ease 2.4s forwards;}

.win-col{display:flex;flex-direction:column;gap:4px;font-family:'JetBrains Mono',monospace;font-size:12px;position:relative;}
.wrow{display:grid;grid-template-columns:1.4fr .8fr .8fr;gap:8px;background:var(--surface-3);border-radius:6px;padding:6px 10px;}
.wframe{position:absolute;left:-3px;right:-3px;height:33px;border:2px solid var(--accent);border-radius:8px;opacity:0;pointer-events:none;}
.demo-box.play .wframe{animation:slideFrame 3.6s ease forwards;}
@keyframes slideFrame{0%{opacity:0;top:0;}8%{opacity:1;top:0px;}28%{top:37px;}48%{top:74px;}68%{opacity:1;top:129px;}88%{top:166px;}100%{top:203px;opacity:1;}}
.running{opacity:0;color:var(--teal);font-weight:700;}
.demo-box.play .running.r1{animation:popIn .25s ease .3s forwards;}
.demo-box.play .running.r2{animation:popIn .25s ease 1.05s forwards;}
.demo-box.play .running.r3{animation:popIn .25s ease 1.8s forwards;}
.demo-box.play .running.r4{animation:popIn .25s ease 2.65s forwards;}
.demo-box.play .running.r5{animation:popIn .25s ease 3.4s forwards;}

.race{display:flex;gap:16px;}
.lane{flex:1;}
.lane h4{margin:0 0 8px;font-size:11.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:500;}
.blocks{display:flex;gap:3px;}
.blk{flex:1;height:24px;background:var(--surface-3);border-radius:3px;position:relative;}
.blk.hit{background:var(--surface-3);}
.demo-box.play .lane.seq .blk{animation:scanHit 1.8s ease forwards;}
.demo-box.play .lane.seq .blk:nth-child(1){animation-delay:.05s;}
.demo-box.play .lane.seq .blk:nth-child(2){animation-delay:.2s;}
.demo-box.play .lane.seq .blk:nth-child(3){animation-delay:.35s;}
.demo-box.play .lane.seq .blk:nth-child(4){animation-delay:.5s;}
.demo-box.play .lane.seq .blk:nth-child(5){animation-delay:.65s;}
.demo-box.play .lane.seq .blk:nth-child(6){animation-delay:.8s;}
.demo-box.play .lane.seq .blk:nth-child(7){animation-delay:.95s;}
.demo-box.play .lane.seq .blk:nth-child(8){animation-delay:1.1s;background:var(--success);}
@keyframes scanHit{0%{background:var(--surface-3);}50%{background:var(--accent);}100%{background:var(--surface-3);}}
.demo-box.play .lane.idx .blk.target{animation:idxHit .3s ease .5s forwards;}
@keyframes idxHit{to{background:var(--success);}}
.race-caption{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;opacity:0;}
.demo-box.play .race-caption{animation:popIn .3s ease 2s forwards;}

.wallets{display:flex;gap:20px;align-items:center;justify-content:center;position:relative;}
.wallet{background:var(--surface-3);border-radius:10px;padding:12px 18px;text-align:center;min-width:100px;}
.wallet .name{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.wallet .bal{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:4px;}
.coin{position:absolute;top:16px;left:calc(50% - 8px);width:16px;height:16px;border-radius:50%;background:var(--accent);opacity:0;}
.status{text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;height:18px;}

.gate-wrap{display:flex;align-items:center;gap:16px;justify-content:center;}
.incoming{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface-3);padding:8px 12px;border-radius:6px;position:relative;}
.gate{width:3px;height:44px;background:var(--muted);border-radius:2px;}
.stored{display:flex;flex-direction:column;gap:4px;font-family:'JetBrains Mono',monospace;font-size:11px;min-width:110px;}
.stored div{background:var(--surface-3);border-radius:5px;padding:4px 8px;}
.err{color:var(--rose);font-size:11px;font-family:'JetBrains Mono',monospace;text-align:center;height:16px;}

.views-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.view-card{background:var(--surface-3);border-radius:8px;padding:10px 12px;}
.view-card h5{margin:0 0 8px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.view-val{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--teal);}
.stale{color:var(--rose)!important;}

.json-tree{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;}
.json-line{cursor:pointer;padding:1px 4px;border-radius:3px;}
.json-line:hover{background:var(--surface-3);}
.json-line.hl{background:rgba(242,184,75,0.18);color:var(--accent);}
.json-key{color:var(--teal);}
.json-result{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:12.5px;background:var(--surface-3);border-radius:6px;padding:8px 12px;color:var(--accent);min-height:16px;}

.norm-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.messy{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface-3);border-radius:8px;padding:10px;width:100%;transition:opacity .5s ease;}
.split-pair{display:flex;gap:14px;width:100%;opacity:0;}
.demo-box.play .split-pair{animation:popIn .5s ease 1s forwards;}
.demo-box.play .messy{animation:fadeOut .5s ease .8s forwards;}
@keyframes fadeOut{to{opacity:0;height:0;padding:0;overflow:hidden;}}
.split-box{flex:1;font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface-3);border:1px solid var(--teal);border-radius:8px;padding:10px;}
.fk-label{text-align:center;font-size:10px;color:var(--muted);margin-top:-4px;}

.shards{display:flex;gap:8px;justify-content:center;}
.shard{flex:1;background:var(--surface-3);border-radius:8px;padding:10px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;opacity:0;transform:scale(.9);}
.demo-box.play .shard{animation:popIn .35s ease forwards;}
.demo-box.play .shard:nth-child(1){animation-delay:.2s;}
.demo-box.play .shard:nth-child(2){animation-delay:.5s;}
.demo-box.play .shard:nth-child(3){animation-delay:.8s;}
.repl-row{display:flex;gap:20px;justify-content:center;align-items:center;margin-top:14px;}
.repl-node{width:54px;height:54px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;text-align:center;position:relative;}
.repl-node.primary{border:2px solid var(--accent);}
.demo-box.play .repl-node.primary{animation:pulseNode 1.4s ease 1.2s infinite;}
.demo-box.play .repl-node.rep{animation:popIn .3s ease forwards;}
.demo-box.play .repl-node.rep.r1{animation-delay:1.5s;}
.demo-box.play .repl-node.rep.r2{animation-delay:1.9s;}
@keyframes pulseNode{0%,100%{box-shadow:0 0 0 0 rgba(242,184,75,.4);}50%{box-shadow:0 0 0 8px rgba(242,184,75,0);}}

footer{text-align:center;color:var(--muted);font-size:12px;margin-top:40px;font-family:'JetBrains Mono',monospace;}

@media (max-width:560px){
  .panel{margin-left:0;}
  .race{flex-direction:column;}
  .views-grid{grid-template-columns:1fr;}
  .split-pair{flex-direction:column;}
}
</style>
</head>
<body>
<script src="nav.js" defer></script>
<div class="wrap">

  <div class="hero">
    <div class="eyebrow">the query line · postgres roadmap</div>
    <h1>PostgreSQL, <span>like a pro.</span></h1>
    <p>Twelve stops. Each one explained the way you'd explain it to a curious kid — then backed with the real SQL and the interview angle you'll actually get asked about.</p>
    <div class="query-bar"><span id="typed"></span><span class="caret"></span></div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0 / 12 learned</div>
    </div>
  </div>

  <div class="roadmap">
    <div class="track-line"></div>
    <div class="stops" id="stops"></div>
  </div>

  <footer>tap a stop → watch it animate → mark it learned</footer>
</div>

<script>
/* ---------------- typing hero effect ---------------- */
const typedEl = document.getElementById('typed');
const query = [
  {t:"SELECT ",c:"k"},{t:"skill ",c:""},{t:"FROM ",c:"k"},{t:"you ",c:""},
  {t:"WHERE ",c:"k"},{t:"effort ",c:""},{t:"= ",c:""},{t:"'consistent'",c:"s"},{t:";",c:""}
];
let qi=0, ci=0;
function typeStep(){
  if(qi>=query.length){ setTimeout(()=>{typedEl.innerHTML="";qi=0;ci=0;typeStep();},2200); return; }
  const chunk = query[qi];
  if(ci===0){ typedEl.innerHTML += `<span class="${chunk.c}">`+ "</span>"; }
  const span = typedEl.querySelector('span:last-child');
  if(ci < chunk.t.length){
    span.textContent += chunk.t[ci];
    ci++;
    setTimeout(typeStep, 38);
  } else {
    qi++; ci=0;
    setTimeout(typeStep, 30);
  }
}
typeStep();

/* ---------------- storage helpers ---------------- */
async function loadProgress(){
  try{
    const r = await window.storage.get('pg-roadmap-progress');
    return r ? JSON.parse(r.value) : [];
  }catch(e){ return []; }
}
async function saveProgress(arr){
  try{ await window.storage.set('pg-roadmap-progress', JSON.stringify(arr)); }catch(e){}
}

/* ---------------- topic data ---------------- */
const TOPICS = [
{id:'foundations', title:'SELECT, WHERE, ORDER BY, LIMIT', tagline:'Asking for exactly the books you want from the librarian.',
 analogy:'Imagine a giant shelf of books (your table). <b>SELECT</b> is you pointing at which shelves to look at, <b>WHERE</b> is telling the librarian "only ones by this author," <b>ORDER BY</b> is asking her to stack them by year, and <b>LIMIT</b> is saying "just hand me the first 3."',
 sql:`<span class="kw">SELECT</span> name, qty, price
<span class="kw">FROM</span> fruits
<span class="kw">WHERE</span> qty > 4
<span class="kw">ORDER BY</span> qty <span class="kw">ASC</span>
<span class="kw">LIMIT</span> 3;`,
 tip:'Interviewers love asking the exact execution order: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT. Memorize that order, not the way it reads.',
 demo:'foundations'},

{id:'aggregate', title:'GROUP BY, HAVING & Aggregates', tagline:'Sorting candy into buckets, then counting each bucket.',
 analogy:'<b>GROUP BY</b> dumps every row into a bucket based on a shared value (like color). <b>COUNT/SUM/AVG</b> tell you something about each bucket. <b>HAVING</b> then throws away buckets that don\'t meet a rule — like "only keep buckets with 3+ candies."',
 sql:`<span class="kw">SELECT</span> color, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> total
<span class="kw">FROM</span> candies
<span class="kw">GROUP BY</span> color
<span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) >= 3;`,
 tip:'Classic gotcha: WHERE filters rows before grouping; HAVING filters groups after aggregation. You cannot use an aggregate inside WHERE — that\'s the tell interviewers listen for.',
 demo:'aggregate'},

{id:'joins', title:'JOIN types', tagline:'Two tables are puzzle pieces — how do you snap them together?',
 analogy:'Picture two overlapping circles: Table A and Table B. <b>INNER JOIN</b> keeps only the overlap. <b>LEFT JOIN</b> keeps all of A plus the overlap. <b>FULL JOIN</b> keeps everything from both, matched where possible.',
 sql:`<span class="kw">SELECT</span> o.id, c.name
<span class="kw">FROM</span> orders o
<span class="kw">LEFT JOIN</span> customers c
  <span class="kw">ON</span> o.customer_id = c.id;`,
 tip:'Be ready to explain why a LEFT JOIN + WHERE clause on the right table silently turns into an INNER JOIN (the WHERE filters out the NULLs LEFT JOIN produces). Very common senior-level trap question.',
 demo:'joins'},

{id:'subquery', title:'Subqueries & CTEs', tagline:'A question tucked inside another question.',
 analogy:'A subquery is like asking "what\'s the average price of all fruit?" first, then using that answer inside a bigger question: "show me fruits pricier than average." A <b>CTE</b> (<code>WITH</code>) is the same idea, just written up top and named so it reads cleanly.',
 sql:`<span class="kw">WITH</span> avg_price <span class="kw">AS</span> (
  <span class="kw">SELECT</span> <span class="fn">AVG</span>(price) <span class="kw">AS</span> ap <span class="kw">FROM</span> fruits
)
<span class="kw">SELECT</span> * <span class="kw">FROM</span> fruits, avg_price
<span class="kw">WHERE</span> price > ap;`,
 tip:'Know when a CTE is just for readability vs. when it changes performance — in Postgres 12+, CTEs are inlined by default unless marked MATERIALIZED, unlike older versions which always materialized them.',
 demo:'subquery'},

{id:'window', title:'Window Functions', tagline:'Peeking at your neighbors in line — without breaking the line.',
 analogy:'A window function looks across a group of rows (a "partition") without collapsing them into one row like GROUP BY does. Think of a running total that walks down each row, remembering everything it saw before it in that group.',
 sql:`<span class="kw">SELECT</span> dept, salary,
  <span class="fn">SUM</span>(salary) <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> dept <span class="kw">ORDER BY</span> salary
  ) <span class="kw">AS</span> running_total
<span class="kw">FROM</span> employees;`,
 tip:'RANK() vs DENSE_RANK() vs ROW_NUMBER() is asked constantly: RANK leaves gaps after ties, DENSE_RANK doesn\'t, ROW_NUMBER never ties at all.',
 demo:'window'},

{id:'index', title:'Indexes & EXPLAIN', tagline:'A book\'s index vs. reading every single page.',
 analogy:'Without an index, Postgres checks every row one by one — a <b>sequential scan</b>. With the right index, it jumps almost straight to the answer, like flipping to a page number instead of reading cover to cover.',
 sql:`<span class="kw">CREATE INDEX</span> idx_orders_customer
  <span class="kw">ON</span> orders (customer_id);

<span class="kw">EXPLAIN ANALYZE</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> orders <span class="kw">WHERE</span> customer_id = 42;`,
 tip:'Indexes speed up reads but slow down writes (every INSERT/UPDATE must also update the index) — and a B-tree index on a low-cardinality column (like a boolean) often doesn\'t help at all. Both are favorite senior-round questions.',
 demo:'index'},

{id:'transactions', title:'Transactions & ACID', tagline:'A bank transfer: either both accounts change, or neither does.',
 analogy:'A transaction bundles several steps into one all-or-nothing move. If anything fails halfway, Postgres <b>rolls back</b> everything, like the transfer never happened. If everything succeeds, it <b>commits</b> for good.',
 sql:`<span class="kw">BEGIN</span>;
<span class="kw">UPDATE</span> accounts <span class="kw">SET</span> balance = balance - 50 <span class="kw">WHERE</span> id = 1;
<span class="kw">UPDATE</span> accounts <span class="kw">SET</span> balance = balance + 50 <span class="kw">WHERE</span> id = 2;
<span class="kw">COMMIT</span>;`,
 tip:'Know the four letters cold: Atomicity, Consistency, Isolation, Durability — and be able to name Postgres\'s default isolation level (Read Committed) plus what changes at Serializable.',
 demo:'transactions'},

{id:'constraints', title:'Constraints & Keys', tagline:'A bouncer at the door, checking the rules before anyone gets in.',
 analogy:'A <b>PRIMARY KEY</b> makes sure every row has its own unique ID. A <b>FOREIGN KEY</b> makes sure you can\'t reference something that doesn\'t exist. <b>UNIQUE</b>, <b>NOT NULL</b> and <b>CHECK</b> are extra bouncers, each checking a different rule before a row is let in.',
 sql:`<span class="kw">CREATE TABLE</span> orders (
  id <span class="kw">SERIAL PRIMARY KEY</span>,
  customer_id <span class="kw">INT REFERENCES</span> customers(id),
  email <span class="kw">TEXT UNIQUE NOT NULL</span>,
  qty <span class="kw">INT CHECK</span> (qty > 0)
);`,
 tip:'Be able to explain ON DELETE CASCADE vs RESTRICT vs SET NULL on a foreign key — it\'s the most common follow-up once you mention keys.',
 demo:'constraints'},

{id:'views', title:'Views & Materialized Views', tagline:'A live window vs. a photograph.',
 analogy:'A regular <b>VIEW</b> is just a saved question — every time you look through it, it re-asks the live data, so it\'s always fresh. A <b>MATERIALIZED VIEW</b> is a photograph of the answer taken once — fast to look at, but frozen until you tell it to refresh.',
 sql:`<span class="kw">CREATE MATERIALIZED VIEW</span> daily_sales <span class="kw">AS</span>
<span class="kw">SELECT</span> <span class="fn">SUM</span>(total) <span class="kw">FROM</span> orders;

<span class="kw">REFRESH MATERIALIZED VIEW</span> daily_sales;`,
 tip:'Mention CONCURRENTLY: REFRESH MATERIALIZED VIEW CONCURRENTLY avoids locking the view for readers while it refreshes — but it requires a unique index to exist first.',
 demo:'views'},

{id:'json', title:'JSON & JSONB', tagline:'A flexible box that can hold any shape of stuff.',
 analogy:'Normal columns expect a fixed shape, like a labeled drawer. <b>JSONB</b> is more like a backpack — you can stuff nested, changing-shape data into one column and still dig a specific item out of it with <code>-></code> and <code>->></code>.',
 sql:`<span class="kw">SELECT</span> data->'address'->>'city' <span class="kw">AS</span> city
<span class="kw">FROM</span> users
<span class="kw">WHERE</span> data->>'plan' = 'pro';`,
 tip:'Always prefer JSONB over JSON in interviews and in practice — JSONB is stored in a binary, indexable form (supports GIN indexes) while JSON is just stored as text and re-parsed every time.',
 demo:'json'},

{id:'normalize', title:'Normalization', tagline:'Turning one messy junk drawer into labeled drawers.',
 analogy:'A messy table repeats the same customer info on every single order row. Normalizing means splitting that into a Customers table and an Orders table, linked by an ID — no more duplicated, hard-to-update copies of the same fact.',
 sql:`<span class="kw">CREATE TABLE</span> customers (id <span class="kw">SERIAL PRIMARY KEY</span>, name <span class="kw">TEXT</span>);
<span class="kw">CREATE TABLE</span> orders (
  id <span class="kw">SERIAL PRIMARY KEY</span>,
  customer_id <span class="kw">INT REFERENCES</span> customers(id),
  total <span class="kw">NUMERIC</span>
);`,
 tip:'Know 1NF/2NF/3NF in one sentence each, and be ready to argue the other side too: sometimes you deliberately denormalize (duplicate data) for read-heavy dashboards to avoid expensive joins.',
 demo:'normalize'},

{id:'scale', title:'Partitioning & Replication', tagline:'Splitting a huge warehouse into sections, and keeping backup warehouses.',
 analogy:'<b>Partitioning</b> splits one huge table into smaller physical chunks (like by year) so queries only search the chunk they need. <b>Replication</b> keeps live copies of the whole database on other machines, so if the main one goes down — or gets too busy — there\'s a backup ready.',
 sql:`<span class="kw">CREATE TABLE</span> events (
  id <span class="kw">BIGINT</span>, created_at <span class="kw">DATE</span>
) <span class="kw">PARTITION BY RANGE</span> (created_at);

<span class="kw">CREATE TABLE</span> events_2026 <span class="kw">PARTITION OF</span> events
  <span class="kw">FOR VALUES FROM</span> ('2026-01-01') <span class="kw">TO</span> ('2027-01-01');`,
 tip:'Be precise on replication lag: streaming replicas are usually asynchronous by default, meaning a replica can be milliseconds behind — which matters a lot if someone reads-after-write from a replica.',
 demo:'scale'}
];

/* ---------------- render roadmap ---------------- */
const stopsEl = document.getElementById('stops');
let progress = [];

function highlightSQL(str){ return str; } // already hand-tagged

function render(){
  stopsEl.innerHTML = TOPICS.map((t,i)=>`
    <div class="stop ${progress.includes(t.id)?'done':''}" data-id="${t.id}">
      <div class="stop-head">
        <div class="node">${progress.includes(t.id) ? '✓' : (i+1)}</div>
        <div class="stop-main">
          <h3>${t.title}</h3>
          <p>${t.tagline}</p>
        </div>
        <div class="chev">▸</div>
      </div>
      <div class="panel">
        <div class="panel-inner">
          <div class="analogy">${t.analogy}</div>
          <div class="demo-box" id="demo-${t.id}"></div>
          <pre class="code">${t.sql}</pre>
          <div class="tip"><b>INTERVIEW&nbsp;ANGLE</b><span>${t.tip}</span></div>
          <div class="done-toggle" data-id="${t.id}"><span class="box">${progress.includes(t.id)?'✓':''}</span> mark as learned</div>
        </div>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.stop-head').forEach(head=>{
    head.addEventListener('click', ()=>{
      const stop = head.closest('.stop');
      const id = stop.dataset.id;
      const wasOpen = stop.classList.contains('open');
      document.querySelectorAll('.stop').forEach(s=>s.classList.remove('open'));
      if(!wasOpen){
        stop.classList.add('open');
        const box = document.getElementById('demo-'+id);
        if(!box.dataset.built){
          DEMOS[id](box);
          box.dataset.built = '1';
        }
        requestAnimationFrame(()=>{ box.classList.add('play'); });
      }
    });
  });

  document.querySelectorAll('.done-toggle').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = el.dataset.id;
      if(progress.includes(id)){ progress = progress.filter(x=>x!==id); }
      else { progress.push(id); }
      saveProgress(progress);
      const openId = document.querySelector('.stop.open')?.dataset.id;
      render();
      if(openId){
        const stop = document.querySelector(`.stop[data-id="${openId}"]`);
        stop.classList.add('open');
        const box = document.getElementById('demo-'+openId);
        DEMOS[openId](box);
        box.dataset.built='1';
        requestAnimationFrame(()=>box.classList.add('play'));
      }
      updateProgressBar();
    });
  });
}

function updateProgressBar(){
  const pct = Math.round((progress.length/TOPICS.length)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = progress.length+' / '+TOPICS.length+' learned';
}

(async function init(){
  progress = await loadProgress();
  render();
  updateProgressBar();
})();

/* replay: reset animation classes when reopening a stop that was already built */
document.addEventListener('click', (e)=>{
  const head = e.target.closest('.stop-head');
  if(!head) return;
  const stop = head.closest('.stop');
  setTimeout(()=>{
    if(stop.classList.contains('open')){
      const box = stop.querySelector('.demo-box');
      if(box && box.dataset.built){
        box.classList.remove('play');
        void box.offsetWidth;
        box.classList.add('play');
      }
    }
  },10);
});
</script>
</body>
</html>
